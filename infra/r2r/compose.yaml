# R2R evidence service — Tuezday's first external OSS integration.
# Uses only published images (R2R code never enters this repo); configured
# with R2R's built-in gemini.toml so the existing GEMINI_API_KEY is the only
# credential. Start from the repo root: npm run r2r:up
#
# R2R API:        http://localhost:7272 (health: /v3/health)
# R2R's Postgres: localhost:5433 (its own data, separate from the app DB)

volumes:
  r2r_postgres_data:
    name: tuezday_r2r_postgres_data

services:
  r2r-postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - r2r_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure
    command: postgres -c max_connections=256

  r2r:
    image: sciphiai/r2r:latest
    depends_on:
      r2r-postgres:
        condition: service_healthy
    environment:
      R2R_PORT: 7272
      R2R_HOST: 0.0.0.0
      R2R_LOG_LEVEL: INFO
      R2R_CONFIG_PATH: /app/user_configs/tuezday.toml
      R2R_PROJECT_NAME: tuezday
      R2R_POSTGRES_USER: postgres
      R2R_POSTGRES_PASSWORD: postgres
      R2R_POSTGRES_HOST: r2r-postgres
      R2R_POSTGRES_PORT: 5432
      R2R_POSTGRES_DBNAME: postgres
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "7272:7272"
    volumes:
      - ./config:/app/user_configs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7272/v3/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: on-failure
